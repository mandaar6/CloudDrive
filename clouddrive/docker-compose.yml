version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Flask Backend ───────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── React Frontend (served by nginx inside the container) ──────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Loki (log aggregation) ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Promtail (log shipper → Loki) ──────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dashboard/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Grafana (dashboard) ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboard/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./dashboard/grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/clouddrive-provider.yml:ro
      - ./dashboard/dashboards:/etc/grafana/provisioning/dashboards/files:ro
    depends_on:
      - loki
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

volumes:
  postgres_data:
  grafana_data:

networks:
  internal:
    driver: bridge
