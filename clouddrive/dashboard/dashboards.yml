apiVersion: 1

providers:
  - name: clouddrive
    orgId: 1
    folder: CloudDrive
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards

