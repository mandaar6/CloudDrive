[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Treat warnings as warnings (not errors), but silence noisy 3rd-party
# DeprecationWarnings that have nothing to do with our code. This keeps
# CI/CD output focused on real signal.
filterwarnings =
    ignore::DeprecationWarning:botocore.*
    ignore::DeprecationWarning:sqlalchemy.*
    ignore::DeprecationWarning:flask_limiter.*
    ignore::DeprecationWarning:jwt.*

# Markers used to slice the suite in CI/CD if we want to run subsets.
markers =
    smoke: fast smoke tests that must pass on every commit
    security: security regression tests
    slow: tests that take >1s