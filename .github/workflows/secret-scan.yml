name: CI/CD Secret Scanner

on: 
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Scan Repository for Exposed Secrets
        run: |
          echo "Initiating Deep Source Scan..."
          # General-purpose scanner using Regex to find multiple types of exposed secrets
          if grep -rE "(JWT_SECRET_KEY|POSTGRES_PASSWORD|AWS_SECRET_ACCESS_KEY|MAIL_PASSWORD)=" .; then
            echo "::error::CRITICAL SECURITY ALERT: High-entropy secret or password leaked in commit!"
            echo "Pipeline halted. Please execute the Emergency Credential Rotation Runbook immediately."
            exit 1
          else
            echo "No plaintext secrets detected. Code is safe."
          fi
