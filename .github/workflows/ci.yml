name: CloudDrive CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      TESTING: "true"
      FLASK_ENV: "testing"
      DATABASE_URL: "sqlite:///:memory:"
      JWT_SECRET_KEY: "test-secret-key-ci"
      SECRET_KEY: "test-flask-secret-ci"
      POSTGRES_USER: "test"
      POSTGRES_PASSWORD: "test"
      POSTGRES_DB: "test"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_REGION: "us-east-1"
      S3_BUCKET_NAME: "test-bucket"
      MAIL_SUPPRESS_SEND: "1"
      MAIL_SERVER: "localhost"
      RATELIMIT_STORAGE_URI: "memory://"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: clouddrive/backend
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run functional tests
        working-directory: clouddrive/backend
        run: python -m pytest tests/test_functional.py -v --tb=short

      - name: Run security tests
        working-directory: clouddrive/backend
        run: python -m pytest tests/test_security.py -v --tb=short

  sast:
    name: Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config=p/owasp-top-ten \
            clouddrive/backend/ \
            --json \
            --output semgrep-results.json || true
          cat semgrep-results.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          r=d.get('results',[])
          print(f'Semgrep findings: {len(r)}')
          for f in r:
            print(f'  [{f[\"extra\"][\"severity\"]}] {f[\"check_id\"]}')
          " 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  dependency-scan:
    name: Dependency Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r clouddrive/backend/requirements.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t clouddrive-backend clouddrive/backend/
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: clouddrive-backend
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"
